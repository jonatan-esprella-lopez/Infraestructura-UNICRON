    proxy_pass http://api:4000;
    include /etc/nginx/snippets/proxy.conf;
  }

  location /health {
    proxy_pass http://api:4000/health;
    include /etc/nginx/snippets/proxy.conf;
  }

  location /metrics {
    proxy_pass http://api:4000/metrics;
    include /etc/nginx/snippets/proxy.conf;
  }

  location / {
    proxy_pass http://web:5173;
    include /etc/nginx/snippets/proxy.conf;
  }
}
